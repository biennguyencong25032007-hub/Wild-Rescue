version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wild_rescue_db
    environment:
      POSTGRES_USER: wild_rescue_user
      POSTGRES_PASSWORD: wild_rescue_password
      POSTGRES_DB: wild_rescue
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - wild_rescue_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wild_rescue_backend
    environment:
      DATABASE_URL: postgresql://wild_rescue_user:wild_rescue_password@postgres:5432/wild_rescue
      NODE_ENV: development
      JWT_SECRET: your_jwt_secret_key
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - wild_rescue_network

  redis:
    image: redis:7-alpine
    container_name: wild_rescue_redis
    ports:
      - "6379:6379"
    networks:
      - wild_rescue_network

volumes:
  postgres_data:

networks:
  wild_rescue_network:
    driver: bridge
