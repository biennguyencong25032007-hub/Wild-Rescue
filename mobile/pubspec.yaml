name: wild_rescue
description: Wild Rescue - Animal Rescue Application

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  
  # HTTP Client
  dio: ^5.3.0
  
  # Local Storage
  hive: ^2.2.0
  shared_preferences: ^2.1.0
  
  # Location & Maps
  geolocator: ^9.0.2
  google_maps_flutter: ^2.5.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  firebase_auth: ^4.10.0
  firebase_storage: ^11.2.0
  
  # UI/UX
  flutter_svg: ^2.0.0
  lottie: ^2.4.0
  cached_network_image: ^3.3.0
  connectivity_plus: ^5.0.0
  
  # Notifications
  flutter_local_notifications: ^14.1.0
  
  # Image Handling
  image_picker: ^1.0.0
  image_cropper: ^5.0.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Logging
  logger: ^1.4.0
  
  # Utilities
  uuid: ^4.0.0
  equatable: ^2.0.5
  
  # URL Launcher
  url_launcher: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linter
  flutter_lints: ^2.0.0
  
  # Testing
  mockito: ^5.4.0
  
  # Code Generation
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/onboarding/
    - assets/splash/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
